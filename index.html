<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>
      Frontend Mentor | Huddle landing page with single introductory section
    </title>
  </head>
  <body>
    <main>
      <div class="top-part">
        <div class="left-side">
          <img src="images/logo.svg" alt="" class="logo-img" />
          <img
            src="images/illustration-mockups.svg"
            alt=""
            class="illust-img"
          />
        </div>
        <article class="right-side">
          <h1>Build The Community Your Fans Will Love</h1>
          <p>
            Huddle re-imagines the way we build communities. You have a voice,
            but so does your audience. Create connections with your users as you
            engage in genuine discussion.
          </p>
          <a href="" class="btn"> Register </a>
        </article>
      </div>
      <div class="bottom-part">
        <div class="social-icons-container">
          <img
            src="images/facebook-brands-solid-full.svg"
            alt=""
            class="social-media-icon"
          />
          <img
            src="images/square-twitter-brands-solid-full.svg"
            alt=""
            class="social-media-icon"
          />
          <img
            src="images/square-instagram-brands-solid-full.svg"
            alt=""
            class="social-media-icon"
          />
        </div>
        <div class="creator-details">
          Challenge by
          <a
            href="https://www.frontendmentor.io?ref=challenge"
            class="footer-link"
            >Frontend Mentor</a
          >. Coded by
          <a href="https://github.com/MostafaAwad01" class="footer-link"
            >Mostafa Awad</a
          >.
        </div>
      </div>
    </main>
  </body>
</html>
